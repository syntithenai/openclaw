services:
  openclaw-gateway:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    build:
      context: .
      args:
        OPENCLAW_INSTALL_BROWSER: ${OPENCLAW_INSTALL_BROWSER:-1}
    user: "1000:1000"
    env_file:
      - .env
    environment:
      HOME: /home/node
      TERM: xterm-256color
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      # Facebook Graph API (user feed access)
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET}
      FACEBOOK_USER_ACCESS_TOKEN: ${FACEBOOK_USER_ACCESS_TOKEN}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      GOG_KEYRING_BACKEND: file
      GOG_KEYRING_PASSWORD: ${GOG_KEYRING_PASSWORD}
      GOG_ACCOUNT: ${GOG_ACCOUNT}
      # Audio/Music Player Configuration
      MPD_HOST: ${MPD_HOST:-localhost}
      MPD_PORT: ${MPD_PORT:-6600}
      PULSE_SERVER: unix:${XDG_RUNTIME_DIR:-/run/user/1000}/pulse/native
      ALSA_CARD: ${ALSA_CARD:-default}
      ALSA_PCM_CARD: ${ALSA_PCM_CARD:-default}
      
    ipc: host
    volumes:
      #- ${OPENCLAW_BASE_DIR}/openclaw/:/app
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - ${OPENCLAW_CONFIG_DIR}/gogcli:/home/node/.config/gogcli
      - ${OPENCLAW_CONFIG_DIR}/cache:/home/node/.cache
      - ${OPENCLAW_CONFIG_DIR}/whisper-cache:/home/node/.cache/whisper
      - ${OPENCLAW_CONFIG_DIR}/npm:/home/node/.npm
      # Audio device access for music player
      - /dev/snd:/dev/snd
      - /run/user/1000/pulse:/run/user/1000/pulse:ro
      - /etc/pulse:/etc/pulse:ro
      # Music library for MPD skill
      - ${HOME}/Music:/music:ro
    network_mode: "host"
    restart: unless-stopped
    command:
      [
        "bash",
        "-lc",
        "mpd /home/node/.mpd/mpd.conf 2>/dev/null || true && mpc update 2>/dev/null || true && exec node openclaw.mjs gateway --allow-unconfigured",
      ]

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    build:
      context: .
      args:
        OPENCLAW_INSTALL_BROWSER: ${OPENCLAW_INSTALL_BROWSER:-1}
    env_file:
      - .env
    environment:
      HOME: /home/node
      TERM: xterm-256color
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      # Facebook Graph API (user feed access)
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET}
      FACEBOOK_USER_ACCESS_TOKEN: ${FACEBOOK_USER_ACCESS_TOKEN}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      GOG_KEYRING_BACKEND: file
      GOG_KEYRING_PASSWORD: ${GOG_KEYRING_PASSWORD}
      GOG_ACCOUNT: ${GOG_ACCOUNT}
    volumes:
      #- ${OPENCLAW_BASE_DIR}/openclaw/:/app
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - ${OPENCLAW_CONFIG_DIR}/gogcli:/home/node/.config/gogcli
      - ${OPENCLAW_CONFIG_DIR}/whisper-cache:/home/node/.cache/whisper
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]

networks:
  default:
    name: openclaw_default
